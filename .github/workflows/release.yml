name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe
          - goos: windows
            goarch: arm64
            suffix: windows-arm64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Build agent binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          SUFFIX: ${{ matrix.suffix }}
          VERSION: ${{ github.ref_name }}
        run: |
          CGO_ENABLED=0 go build -trimpath \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o "labtether-agent-${SUFFIX}" \
            ./cmd/labtether-agent

      - name: Create tarball (Linux)
        if: matrix.goos == 'linux'
        env:
          SUFFIX: ${{ matrix.suffix }}
          VERSION: ${{ github.ref_name }}
        run: |
          tar czf "labtether-agent-${SUFFIX}-${VERSION}.tar.gz" "labtether-agent-${SUFFIX}"
          sha256sum "labtether-agent-${SUFFIX}-${VERSION}.tar.gz" > "labtether-agent-${SUFFIX}-${VERSION}.tar.gz.sha256"

      - name: Create zip (Windows)
        if: matrix.goos == 'windows'
        env:
          SUFFIX: ${{ matrix.suffix }}
          VERSION: ${{ github.ref_name }}
        run: |
          zip "labtether-agent-${SUFFIX}-${VERSION}.zip" "labtether-agent-${SUFFIX}"
          sha256sum "labtether-agent-${SUFFIX}-${VERSION}.zip" > "labtether-agent-${SUFFIX}-${VERSION}.zip.sha256"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            labtether-agent-*.tar.gz
            labtether-agent-*.tar.gz.sha256
            labtether-agent-*.zip
            labtether-agent-*.zip.sha256

  build-and-push-image:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push agent image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            APP_VERSION=${{ github.ref_name }}
          tags: |
            ghcr.io/labtether/labtether-agent:${{ github.ref_name }}
            ghcr.io/labtether/labtether-agent:latest
