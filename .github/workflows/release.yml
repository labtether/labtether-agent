name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Build agent binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          SUFFIX: ${{ matrix.suffix }}
          VERSION: ${{ github.ref_name }}
        run: |
          CGO_ENABLED=0 go build -trimpath \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o "labtether-agent-${SUFFIX}" \
            ./cmd/labtether-agent

      - name: Create tarball (Linux)
        if: matrix.goos == 'linux'
        env:
          SUFFIX: ${{ matrix.suffix }}
          VERSION: ${{ github.ref_name }}
        run: |
          tar czf "labtether-agent-${SUFFIX}-${VERSION}.tar.gz" "labtether-agent-${SUFFIX}"
          sha256sum "labtether-agent-${SUFFIX}-${VERSION}.tar.gz" > "labtether-agent-${SUFFIX}-${VERSION}.tar.gz.sha256"

      - name: Checksum raw binary
        env:
          SUFFIX: ${{ matrix.suffix }}
        run: |
          sha256sum "labtether-agent-${SUFFIX}" > "labtether-agent-${SUFFIX}.sha256"

      - name: Sign release metadata
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          SUFFIX: ${{ matrix.suffix }}
          VERSION: ${{ github.ref_name }}
          RELEASE_SIGNING_PRIVATE_KEY: ${{ secrets.RELEASE_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "${RELEASE_SIGNING_PRIVATE_KEY}" ]; then
            echo "RELEASE_SIGNING_PRIVATE_KEY secret is not set — skipping signature step"
            exit 0
          fi
          printf '%s' "${RELEASE_SIGNING_PRIVATE_KEY}" | go run ./scripts/release \
            --version "${VERSION}" \
            --os "${GOOS}" \
            --arch "${GOARCH}" \
            --binary "labtether-agent-${SUFFIX}" \
            --out-prefix "labtether-agent-${SUFFIX}-${VERSION}"

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            labtether-agent-${{ matrix.suffix }}
            labtether-agent-${{ matrix.suffix }}.sha256
            labtether-agent-*.tar.gz
            labtether-agent-*.tar.gz.sha256
            labtether-agent-*.sig
            labtether-agent-*.metadata.json

  build-and-push-image:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push agent image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            APP_VERSION=${{ github.ref_name }}
          tags: |
            ghcr.io/labtether/labtether-agent:${{ github.ref_name }}
            ghcr.io/labtether/labtether-agent:latest
