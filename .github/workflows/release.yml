name: Release

on:
  push:
    tags: ["v*"]

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe
          - goos: windows
            goarch: arm64
            suffix: windows-arm64.exe
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.26"

      - name: Build agent binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          SUFFIX: ${{ matrix.suffix }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -Eeuo pipefail
          if [[ ! "${VERSION}" =~ ^v[0-9A-Za-z][0-9A-Za-z._-]{0,126}$ ]]; then
            echo "::error::release tag must be at most 128 characters and match the hub manifest contract (v plus letters, digits, dot, underscore, or hyphen)"
            exit 1
          fi
          CGO_ENABLED=0 go build -trimpath \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o "labtether-agent-${SUFFIX}" \
            ./cmd/labtether-agent

      - name: Create tarball (Linux)
        if: matrix.goos == 'linux'
        env:
          SUFFIX: ${{ matrix.suffix }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -Eeuo pipefail
          archive="labtether-agent-${SUFFIX}-${VERSION}.tar.gz"
          tar -czf "${archive}" -- "labtether-agent-${SUFFIX}"
          sha256sum -- "${archive}" > "${archive}.sha256"

      - name: Checksum raw binary
        env:
          SUFFIX: ${{ matrix.suffix }}
        run: |
          set -Eeuo pipefail
          binary="labtether-agent-${SUFFIX}"
          sha256sum -- "${binary}" > "${binary}.sha256"

      - name: Sign release metadata
        # Run the signer on the host (not cross-compiled), but embed the matrix
        # target into the signed payload via --os / --arch.
        env:
          TARGET_OS: ${{ matrix.goos }}
          TARGET_ARCH: ${{ matrix.goarch }}
          SUFFIX: ${{ matrix.suffix }}
          VERSION: ${{ github.ref_name }}
          RELEASE_SIGNING_PRIVATE_KEY: ${{ secrets.RELEASE_SIGNING_PRIVATE_KEY }}
          RELEASE_SIGNING_PUBLIC_KEY: jM9Mqx0db6S+w6FMKDnIX2jvVp7N554+6galqPvsq88=
        run: |
          set -Eeuo pipefail
          set +x
          if [ -z "${RELEASE_SIGNING_PRIVATE_KEY}" ]; then
            echo "::error::RELEASE_SIGNING_PRIVATE_KEY must be configured; refusing to publish unsigned agent binaries"
            exit 1
          fi
          signing_key="${RELEASE_SIGNING_PRIVATE_KEY}"
          unset RELEASE_SIGNING_PRIVATE_KEY
          unset GOOS GOARCH

          binary="labtether-agent-${SUFFIX}"
          printf '%s' "${signing_key}" | go run ./scripts/release \
            --version "${VERSION}" \
            --os "${TARGET_OS}" \
            --arch "${TARGET_ARCH}" \
            --binary "${binary}" \
            --out-prefix "labtether-agent-${SUFFIX}-${VERSION}" \
            --expected-public-key "${RELEASE_SIGNING_PUBLIC_KEY}"
          unset signing_key
          sha256sum --check --status -- "${binary}.sha256"

      - name: Attest binary provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: ${{ github.workspace }}/labtether-agent-${{ matrix.suffix }}

      - name: Upload Linux release assets
        if: matrix.goos == 'linux'
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: |
            labtether-agent-${{ matrix.suffix }}
            labtether-agent-${{ matrix.suffix }}.sha256
            labtether-agent-${{ matrix.suffix }}-${{ github.ref_name }}.tar.gz
            labtether-agent-${{ matrix.suffix }}-${{ github.ref_name }}.tar.gz.sha256
            labtether-agent-${{ matrix.suffix }}-${{ github.ref_name }}.sig
            labtether-agent-${{ matrix.suffix }}-${{ github.ref_name }}.metadata.json
          fail_on_unmatched_files: true

      - name: Upload Windows release assets
        if: matrix.goos == 'windows'
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: |
            labtether-agent-${{ matrix.suffix }}
            labtether-agent-${{ matrix.suffix }}.sha256
            labtether-agent-${{ matrix.suffix }}-${{ github.ref_name }}.sig
            labtether-agent-${{ matrix.suffix }}-${{ github.ref_name }}.metadata.json
          fail_on_unmatched_files: true

  build-and-push-image:
    needs: build-binaries
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Validate release tag
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -Eeuo pipefail
          if [[ ! "${VERSION}" =~ ^v[0-9A-Za-z][0-9A-Za-z._-]{0,126}$ ]]; then
            echo "::error::release tag must be at most 128 characters and match the hub manifest contract (v plus letters, digits, dot, underscore, or hyphen)"
            exit 1
          fi

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push agent image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            APP_VERSION=${{ github.ref_name }}
          tags: |
            ghcr.io/labtether/labtether-agent:${{ github.ref_name }}
            ghcr.io/labtether/labtether-agent:latest
          provenance: mode=max
          sbom: true

      - name: Attest pushed image provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ghcr.io/labtether/labtether-agent
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
