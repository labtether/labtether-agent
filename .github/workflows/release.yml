name: Release Source Verification

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  verify-release-source:
    name: Verify source for ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe
          - goos: windows
            goarch: arm64
            suffix: windows-arm64.exe
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26"

      - name: Validate exact stable tag
        env:
          VERSION: ${{ github.ref_name }}
          EXPECTED_COMMIT: ${{ github.sha }}
        run: |
          set -Eeuo pipefail
          if [[ ! "${VERSION}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::release tag must use strict vX.Y.Z form"
            exit 1
          fi
          if [[ "$(git rev-parse HEAD)" != "${EXPECTED_COMMIT}" ]]; then
            echo "::error::checked-out source does not match the tag event commit"
            exit 1
          fi
          if [[ -n "$(git status --porcelain=v1 --untracked-files=all)" ]]; then
            echo "::error::release source checkout is not clean"
            exit 1
          fi

      - name: Test release tooling
        env:
          GOWORK: "off"
        run: go test ./scripts/release/...

      - name: Compile source without publishing artifacts
        env:
          GOWORK: "off"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          SUFFIX: ${{ matrix.suffix }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -Eeuo pipefail
          output="${RUNNER_TEMP}/labtether-agent-${SUFFIX}"
          go build -mod=readonly -trimpath -buildvcs=true \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o "${output}" \
            ./cmd/labtether-agent
          test -s "${output}"

      # Binary release assets are intentionally not signed, attested, uploaded,
      # or published from GitHub Actions. Maintainers use the local-only
      # draft/inspect/publish lane documented in docs/RELEASE_SIGNING.md.
