name: Container Release

on:
  push:
    tags: ["v*"]

permissions: {}

defaults:
  run:
    shell: bash

# This workflow is intentionally independent from the GitHub Release binary
# lane. It publishes only the GHCR image, uses only GitHub's ephemeral token,
# and never receives the local Ed25519 release-signing key.
jobs:
  publish-container-image:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Validate exact stable tag
        env:
          VERSION: ${{ github.ref_name }}
          EXPECTED_COMMIT: ${{ github.sha }}
        run: |
          set -Eeuo pipefail
          if [[ ! "${VERSION}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::container release tag must use strict vX.Y.Z form"
            exit 1
          fi

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Verify tag event source
        env:
          EXPECTED_COMMIT: ${{ github.sha }}
        run: |
          set -Eeuo pipefail
          if [[ "$(git rev-parse HEAD)" != "${EXPECTED_COMMIT}" ]]; then
            echo "::error::checked-out source does not match the tag event commit"
            exit 1
          fi
          if [[ -n "$(git status --porcelain=v1 --untracked-files=all)" ]]; then
            echo "::error::container source checkout is not clean"
            exit 1
          fi

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push agent image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            APP_VERSION=${{ github.ref_name }}
          tags: |
            ghcr.io/labtether/labtether-agent:${{ github.ref_name }}
            ghcr.io/labtether/labtether-agent:latest
          provenance: mode=max
          sbom: true

      - name: Attest pushed image provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ghcr.io/labtether/labtether-agent
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
