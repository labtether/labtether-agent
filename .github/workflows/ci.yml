name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.26'
      - name: Check formatting
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "Go files need formatting:"
            echo "$UNFORMATTED"
            exit 1
          fi
      - run: go vet ./...
        name: Vet
      - run: go test -race ./...
        name: Race test
      - run: go build ./cmd/labtether-agent/
        name: Build
      - name: Install pinned source-quality tools
        env:
          GOBIN: ${{ runner.temp }}/quality-bin
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@v2.25.0
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          go install github.com/zricethezav/gitleaks/v8@v8.30.1
          echo "${GOBIN}" >> "${GITHUB_PATH}"
      - name: Go security scan
        run: bash ./scripts/check-gosec-allowlist.sh
      - name: Lint GitHub Actions workflows
        run: actionlint
      - name: Scan current source for secrets
        run: gitleaks dir . --no-banner --redact --timeout 300

  cross-build:
    # FreeBSD is a source-portability gate only; this does not add a release artifact.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: freebsd
            goarch: amd64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.26'
      - name: Compile ${{ matrix.goos }}/${{ matrix.goarch }} source and tests
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build -trimpath -o /tmp/labtether-agent-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/labtether-agent
          mkdir -p /tmp/labtether-agent-test-binaries
          go test -c -o /tmp/labtether-agent-test-binaries/ ./...
